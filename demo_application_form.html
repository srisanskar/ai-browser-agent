<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sample Application Form</title>
<style>
  body {
    font-family: -apple-system, "Segoe UI", Arial, sans-serif;
    background: #f4f5f7;
    margin: 0;
    padding: 40px 20px;
    display: flex;
    justify-content: center;
  }
  .card {
    background: #ffffff;
    max-width: 520px;
    width: 100%;
    padding: 32px 36px;
    border-radius: 10px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  h1 {
    font-size: 20px;
    margin: 0 0 4px;
  }
  p.subtitle {
    color: #666;
    font-size: 14px;
    margin: 0 0 24px;
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #333;
    margin-bottom: 6px;
  }
  input, textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #d5d8dc;
    border-radius: 6px;
    font-size: 14px;
    margin-bottom: 18px;
    box-sizing: border-box;
    font-family: inherit;
  }
  textarea {
    min-height: 90px;
    resize: vertical;
  }
  button {
    background: #2563eb;
    color: white;
    border: none;
    padding: 12px 22px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { background: #1d4ed8; }
</style>
</head>
<body>
  <div class="card">
    <h1>Internship Application Form</h1>
    <p class="subtitle">Sample form for testing — fields match a typical stored profile.</p>
    <form onsubmit="event.preventDefault(); alert('Form submitted! (this is just a demo page, nothing is actually sent anywhere)');">
      <label for="full_name">Full Name</label>
      <input id="full_name" name="full_name" type="text" placeholder="e.g. Arjun Sharma">

      <label for="email">Email Address</label>
      <input id="email" name="email" type="email" placeholder="e.g. arjun@example.com">

      <label for="phone">Phone Number</label>
      <input id="phone" name="phone" type="tel" placeholder="e.g. 9876543210">

      <label for="address">Home Address</label>
      <input id="address" name="address" type="text" placeholder="e.g. 12 MG Road, Kanpur, UP">

      <label for="resume">Resume / Professional Summary</label>
      <textarea id="resume" name="resume" placeholder="Paste your resume text or a short professional summary"></textarea>

      <button type="submit">Submit Application</button>
    </form>
  </div>
</body>
</html>
